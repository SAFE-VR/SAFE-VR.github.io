<ul class="horizontal-list{% if include.class_name %} {{ include.class_name }}{% endif %}">
  {% for item in include.collection %}
    <li>
      <a href="{{ item.url }}"{% if include.link_class %} class="{{ include.link_class }}"{% endif %}>
        {{ item.title }}
      </a>
    </li>
  {% endfor %}
</ul>
